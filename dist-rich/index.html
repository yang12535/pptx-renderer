<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPTX Viewer</title>
<style>*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  background: #222;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}
#stage {
  margin-top: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  background: #fff;
}
.slide {
  position: relative;
  overflow: hidden;
  display: none;
}
.slide.active { display: block; }
.p-el {
  position: absolute;
  overflow: hidden;
}
.p-shape {
  overflow: hidden;
}
.p-img {
  object-fit: fill;
}
.p-placeholder {
  font-family: monospace;
}
#controls {
  margin: 16px 0;
  color: #fff;
  display: flex;
  gap: 12px;
  align-items: center;
}
#controls button {
  padding: 6px 16px;
  border: none;
  border-radius: 4px;
  background: #444;
  color: #fff;
  cursor: pointer;
}
#controls button:hover { background: #555; }
#controls button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="stage">
<div class="slide" data-index="0" style="width:960px;height:540px;background:#FFFFFF;">
  <img class="p-el p-img" src="./media/test_img.png" style="position:absolute;left:629.92px;top:48px;width:288px;height:288px;" alt="">
  <div class="p-el p-shape" style="position:absolute;left:48px;top:335.96px;width:192px;height:96px;background:linear-gradient(to bottom,#4F81BD,#F79646);"></div>
  <div class="p-el p-shape" style="position:absolute;left:335.96px;top:335.96px;width:144px;height:48px;transform:rotate(7.5deg);background:transparent;"><div class="p-txBody" style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;box-sizing:border-box;"><p style="text-align:left;margin:0;line-height:1.2;"><span style="font-size:18pt;color:#333333;">旋转文本 45°</span></p></div></div>
</div>
<div class="slide" data-index="1" style="width:960px;height:540px;background:#F8F9FA;">
  <div class="p-el p-shape" style="position:absolute;left:48px;top:48px;width:864px;height:72px;background:transparent;"><div class="p-txBody" style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;box-sizing:border-box;"><p style="text-align:ctr;margin:0;line-height:1.2;"><span style="font-size:32pt;color:#222222;">第二页：更多元素测试</span></p></div></div>
  <div class="p-el p-shape" style="position:absolute;left:48px;top:144px;width:192px;height:96px;background:#9BBB59;border:1px solid #6B8E3B;border-radius:10%;"></div>
</div>
</div>
<div id="controls">
  <button id="prev">←</button>
  <span id="page">1 / 2</span>
  <button id="next">→</button>
</div>
<script>
(function(){
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;
  function show(i) {
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    document.getElementById('page').textContent = (i + 1) + ' / ' + total;
    document.getElementById('prev').disabled = i === 0;
    document.getElementById('next').disabled = i === total - 1;
  }
  document.getElementById('prev').onclick = () => { if (current > 0) show(--current); };
  document.getElementById('next').onclick = () => { if (current < total - 1) show(++current); };
  show(0);
})();
</script>
</body>
</html>
