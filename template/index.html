<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPTX Viewer</title>
<link rel="stylesheet" href="./assets/css/viewer.css">
</head>
<body>

<!-- 上传区域 -->
<div id="upload-zone" class="{{UPLOAD_ZONE_CLASS}}">
  <div class="drop-area" id="drop-area" role="button" tabindex="0" aria-label="打开 PPTX 文件，点击选择或拖拽文件到此处">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <h2>打开 PPTX 文件</h2>
    <p>点击选择或拖拽文件到此处</p>
  </div>
  <input type="file" id="file-input" accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation">
  <div id="upload-loading" role="status" aria-live="polite"><div class="spinner"></div>正在解析...</div>
  <div id="upload-error" role="alert"></div>
</div>

<!-- 幻灯片舞台 -->
<div id="stage" style="{{STAGE_STYLE}}">
  <div id="stage-inner" data-width="{{SLIDE_WIDTH}}" data-height="{{SLIDE_HEIGHT}}">
    {{SLIDES}}
  </div>
</div>

<!-- 控制栏 -->
<div id="controls" style="{{CONTROLS_STYLE}}">
  <div id="progress-bar"></div>
  <button id="prev" aria-label="上一页">←</button>
  <span id="page-info">1 / {{SLIDE_COUNT}}</span>
  <button id="next" aria-label="下一页">→</button>
  <button id="btn-fullscreen" aria-label="全屏">全屏</button>
</div>

<div id="thumbnails" role="navigation" aria-label="幻灯片缩略图"></div>
<div id="toast" role="status" aria-live="polite"></div>

<script src="./assets/vendor/jszip.min.js" defer></script>
<script src="./assets/vendor/echarts.min.js" defer></script>
<script src="./assets/js/pptx-parser.js" defer></script>
<script src="./assets/js/viewer.js" defer></script>
</body>
</html>
