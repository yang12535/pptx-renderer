<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPTX Viewer</title>
<style>*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  background: #222;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}
#stage {
  margin-top: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  background: #fff;
}
.slide {
  position: relative;
  overflow: hidden;
  display: none;
}
.slide.active { display: block; }
.p-el {
  position: absolute;
  overflow: hidden;
}
.p-shape {
  overflow: hidden;
}
.p-img {
  object-fit: fill;
}
.p-placeholder {
  font-family: monospace;
}
#controls {
  margin: 16px 0;
  color: #fff;
  display: flex;
  gap: 12px;
  align-items: center;
}
#controls button {
  padding: 6px 16px;
  border: none;
  border-radius: 4px;
  background: #444;
  color: #fff;
  cursor: pointer;
}
#controls button:hover { background: #555; }
#controls button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="stage">
<div class="slide" data-index="0" style="width:960px;height:540px;background:#F5F5F5;">
  <div class="p-el p-shape" style="position:absolute;left:48px;top:48px;width:192px;height:96px;background:#FF4444;border:1px solid #CC0000;"></div>
  <div class="p-el p-shape" style="position:absolute;left:288px;top:48px;width:288px;height:96px;background:transparent;"><div class="p-txBody" style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;padding:4.8px 9.6px 4.8px 9.6px;box-sizing:border-box;"><p style="text-align:ctr;margin:0;line-height:1.2;"><span style="margin-right:6px;">•</span><span style="font-size:24pt;color:#333333;">Hello PPTX Renderer</span></p><p style="text-align:left;margin:0;line-height:1.2;"><span style="font-size:14pt;color:#666666;">轻量 · 可拓展 · 纯前端</span></p></div></div>
  <div class="p-el p-shape" style="position:absolute;left:48px;top:144px;width:96px;height:96px;background:#44AA44;border-radius:50%;"></div>
  <div class="p-el p-line" style="position:absolute;left:288px;top:144px;width:197.9090700296477px;height:1.33px;background:#3366CC;transform:rotate(14.036243467926479deg);transform-origin:0 0;"></div>
</div>
</div>
<div id="controls">
  <button id="prev">←</button>
  <span id="page">1 / 1</span>
  <button id="next">→</button>
</div>
<script>
(function(){
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;
  function show(i) {
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    document.getElementById('page').textContent = (i + 1) + ' / ' + total;
    document.getElementById('prev').disabled = i === 0;
    document.getElementById('next').disabled = i === total - 1;
  }
  document.getElementById('prev').onclick = () => { if (current > 0) show(--current); };
  document.getElementById('next').onclick = () => { if (current < total - 1) show(++current); };
  show(0);
})();
</script>
</body>
</html>
